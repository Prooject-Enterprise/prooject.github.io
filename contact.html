<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты - Prooject</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container nav-container">
                <a href="index.html" class="logo">Prooject</a>
                <button class="nav-toggle" id="navToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <ul class="nav-menu" id="navMenu">
                    <li><a href="index.html" class="nav-link">Главная</a></li>
                    <li><a href="services.html" class="nav-link">Услуги</a></li>
                    <li><a href="about.html" class="nav-link">О нас</a></li>
                    <li><a href="contact.html" class="nav-link active">Контакты</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <section class="page-header">
        <div class="container">
            <h1>Свяжитесь с нами</h1>
        </div>
    </section>

    <main class="contact-section">
        <div class="container">
            <div class="contact-grid">
                <div class="contact-info">
                    <h3>Контактная информация</h3>
                    <div class="contact-item">
                        <span>📍</span>
                        <p>Москва, Россия</p>
                    </div>
                    <div class="contact-item">
                        <span>📧</span>
                        <p>info@prooject.com</p>
                    </div>
                    <div class="contact-item">
                        <span>📱</span>
                        <p>+7 (999) 123-45-67</p>
                    </div>
                    <div class="contact-item">
                        <span>💬</span>
                        <p>Telegram: @prooject</p>
                    </div>
                    <div class="contact-item">
                        <span>🕒</span>
                        <p>Пн-Пт: 9:00 - 18:00 (MSK)</p>
                    </div>
                </div>

                <div class="contact-form">
                    <h3>Отправить сообщение</h3>
                    <form id="contactForm">
                        <div class="form-group">
                            <label for="name">Ваше имя</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="subject">Тема</label>
                            <input type="text" id="subject" name="subject" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Сообщение</label>
                            <textarea id="message" name="message" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-secondary">Отправить</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Prooject. Все права защищены.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
